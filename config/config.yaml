project:
  name: Dead Internet Observatory
  version: 1.0.0
  description: Tracking the synthetic takeover of the public internet

storage:
  backend: local          # 'local' or 's3'
  local_path: ./data
  s3_bucket: dead-internet-observatory
  bronze_path: bronze
  silver_path: silver
  gold_path: gold
  db_path: ./data/observatory.db   # SQLite for Streamlit

sources:
  common_crawl:
    enabled: true
    # Quarterly snapshots — format CC-MAIN-YYYY-WW
    # Covers 2013–2025 for pre/post AI baseline comparison
    crawl_dates:
      # 2013 — pre-AI baseline
      - "2013-20"
      - "2013-48"
      # 2014
      - "2014-10"
      - "2014-42"
      # 2015
      - "2015-11"
      - "2015-40"
      # 2016
      - "2016-07"
      - "2016-44"
      # 2017
      - "2017-09"
      - "2017-43"
      # 2018
      - "2018-09"
      - "2018-43"
      # 2019 — established baseline
      - "2019-09"
      - "2019-22"
      - "2019-35"
      - "2019-47"
      # 2020
      - "2020-10"
      - "2020-24"
      - "2020-40"
      - "2020-50"
      # 2021
      - "2021-04"
      - "2021-17"
      - "2021-31"
      - "2021-43"
      # 2022 — pre-ChatGPT
      - "2022-05"
      - "2022-21"
      - "2022-33"
      - "2022-49"
      # 2023 — ChatGPT era begins
      - "2023-06"
      - "2023-14"
      - "2023-23"
      - "2023-40"
      # 2024
      - "2024-10"
      - "2024-22"
      - "2024-33"
      - "2024-46"
      # 2025
      - "2025-06"
      - "2025-21"
    max_segments_per_date: 3
    wet_files_per_segment: 5
    max_records_per_wet: 2000

  reddit:
    enabled: true
    subreddits:
      - worldnews
      - technology
      - science
      - politics
      - AskReddit
      - todayilearned
      - news
      - gaming
      - explainlikeimfive
      - changemyview
    posts_per_sub: 500
    include_comments: true
    max_comments_per_post: 50

  news:
    enabled: true
    feeds:
      - https://feeds.reuters.com/reuters/topNews
      - https://rss.cnn.com/rss/edition.rss
      - https://feeds.bbci.co.uk/news/rss.xml
      - https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
      - https://feeds.washingtonpost.com/rss/world
      - https://www.theguardian.com/world/rss
      - https://feeds.npr.org/1001/rss.xml
      - https://rss.politico.com/politics-news.xml
    max_articles_per_feed: 200
    request_timeout: 20

  wikipedia:
    enabled: true
    sample_articles: 500
    recent_changes_hours: 24
    track_namespaces: [0]   # Main article namespace only

  hackernews:
    enabled: true
    max_stories: 1000
    include_comments: true
    max_comments_per_story: 30
    lookback_days: 7         # harvest stories from the last N days

  bluesky:
    enabled: true
    max_posts: 1000
    search_terms:
      - technology
      - news
      - science
      - culture
      - sports

  fourchan:
    enabled: true
    boards: [g, sci, tv, lit, biz, int, x, his]
    threads_per_board: 15
    posts_per_thread: 50

  steam:
    enabled: true
    reviews_per_game: 100
    app_ids:
      - 730
      - 570
      - 440
      - 1172470
      - 1245620
      - 292030
      - 271590
      - 578080
      - 1091500
      - 2767030
      - 881100
      - 2379780
      - 220
      - 400
      - 620
      - 4000

  youtube:
    enabled: true
    videos_per_topic: 10
    comments_per_video: 100
    search_topics:
      - technology
      - artificial intelligence
      - world news
      - gaming
      - science

  linkedin:
    enabled: true
    max_articles: 100
    request_timeout: 20

  twitter:
    enabled: true
    max_tweets: 500
    search_terms:
      - technology
      - artificial intelligence
      - breaking news
      - science
      - world news
      - gaming
      - finance

  wayback:
    enabled: true
    snapshot_years: [2019, 2021, 2023, 2024, 2025]
    snapshots_per_year: 2    # CDX samples per sentinel URL per year
    sentinel_urls:
      # News front pages
      - https://www.reuters.com/
      - https://www.bbc.com/news
      - https://www.theguardian.com/international
      - https://apnews.com/
      # Tech / HN
      - https://news.ycombinator.com/
      - https://techcrunch.com/
      # Reddit (old.reddit renders better in Wayback)
      - https://old.reddit.com/r/worldnews/
      - https://old.reddit.com/r/technology/
      - https://old.reddit.com/r/science/
      # Reference
      - https://en.wikipedia.org/wiki/Artificial_intelligence
      - https://en.wikipedia.org/wiki/Main_Page
      # Forums / blogs
      - https://news.ycombinator.com/
      - https://lobste.rs/
      - https://marginalrevolution.com/

detection:
  min_text_length: 80
  max_text_length_for_features: 5000
  # Component weights must sum to 1.0
  weights:
    ttr: 0.18
    mtld: 0.12
    entropy: 0.15
    sentence_variance: 0.15
    repetition: 0.15
    burstiness: 0.15
    zipf_deviation: 0.10

analytics:
  index_smoothing_window: 7        # days for rolling average
  anomaly_zscore_threshold: 2.5
  trend_min_data_points: 14
  historical_baseline_year: 2019   # "pre-AI" baseline reference

app:
  demo_mode: false       # generate synthetic data if no real data found
  cache_ttl_seconds: 3600
  refresh_hint_seconds: 300
  # Historical starting score (estimated pre-ChatGPT era)
  baseline_aliveness: 78.0
  # Current estimated score
  current_aliveness: 41.3
