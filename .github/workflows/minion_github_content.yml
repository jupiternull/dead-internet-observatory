name: "🐙 GitHub Content Minion"

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-minions.txt

      - name: Install dependencies
        run: pip install -r requirements-minions.txt

      - name: Run GitHub Content Minion
        run: python3 -m minions.github_bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-bronze-${{ github.run_id }}
          path: data/bronze/github/
          retention-days: 7
          if-no-files-found: warn
