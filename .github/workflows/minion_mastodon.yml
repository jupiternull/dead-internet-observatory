name: "🐘 Mastodon Minion"

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pyyaml tqdm beautifulsoup4 lxml

      - name: Run Mastodon Minion
        run: python3 -m minions.mastodon_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastodon-bronze-${{ github.run_id }}
          path: data/bronze/mastodon/
          retention-days: 7
          if-no-files-found: warn
