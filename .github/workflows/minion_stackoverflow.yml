name: "🔢 Stack Overflow Minion"

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pyyaml tqdm beautifulsoup4 lxml

      - name: Run Stack Overflow Minion
        run: python3 -m minions.stackoverflow_bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          STACKOVERFLOW_API_KEY: ${{ secrets.STACKOVERFLOW_API_KEY }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackoverflow-bronze-${{ github.run_id }}
          path: data/bronze/stackoverflow/
          retention-days: 7
          if-no-files-found: warn
