name: "💼 LinkedIn Minion"

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-minions.txt

      - name: Install dependencies
        run: pip install -r requirements-minions.txt

      - name: Run LinkedIn Minion
        run: python3 -m minions.linkedin_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v6
        with:
          name: linkedin-bronze-${{ github.run_id }}
          path: data/bronze/linkedin/
          retention-days: 7
          if-no-files-found: warn
