name: "🌐 Common Crawl Minion"

on:
  schedule:
    - cron: "0 2 * * *"    # 02:00 UTC
    - cron: "0 6 * * *"    # 06:00 UTC
    - cron: "0 10 * * *"   # 10:00 UTC
    - cron: "0 14 * * *"   # 14:00 UTC
    - cron: "0 18 * * *"   # 18:00 UTC
    - cron: "0 22 * * *"   # 22:00 UTC
  workflow_dispatch:
    inputs:
      crawl_date:
        description: "CC crawl date (e.g. 2025-05)"
        required: false
        default: ""
      max_segments:
        description: "Max segments to sample"
        required: false
        default: "3"

permissions:
  contents: write

concurrency:
  group: cc-backfill
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 240          # CC files are large; allow 4 hours

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-minions.txt

      - name: Install dependencies
        run: pip install -r requirements-minions.txt

      - name: Patch config for this run
        if: ${{ github.event.inputs.crawl_date != '' }}
        env:
          CRAWL_DATE: ${{ github.event.inputs.crawl_date }}
          MAX_SEGMENTS: ${{ github.event.inputs.max_segments }}
        run: |
          python - <<'EOF'
          import os
          import re
          import requests
          import yaml

          with open("config/config.yaml") as f: cfg = yaml.safe_load(f)
          date = os.environ["CRAWL_DATE"]
          if not re.fullmatch(r"\d{4}-\d{2}", date):
              raise SystemExit("crawl_date must use YYYY-WW format")
          coll = requests.get("https://index.commoncrawl.org/collinfo.json", timeout=30)
          coll.raise_for_status()
          available = {entry["id"].replace("CC-MAIN-", "") for entry in coll.json()}
          if date not in available:
              raise SystemExit(f"crawl_date {date} is not available in Common Crawl")
          if date:
              cfg["sources"]["common_crawl"]["crawl_dates"] = [date]
          max_seg = int(os.environ.get("MAX_SEGMENTS") or 3)
          if not 1 <= max_seg <= 100:
              raise SystemExit("max_segments must be between 1 and 100")
          cfg["sources"]["common_crawl"]["max_segments_per_date"] = max_seg
          with open("config/config.yaml", "w") as f: yaml.dump(cfg, f)
          EOF

      - name: Run Common Crawl Minion
        run: python -m minions.common_crawl_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: commoncrawl-bronze-${{ github.run_id }}
          path: data/bronze/common_crawl/
          retention-days: 1
          if-no-files-found: error

      - name: Commit data
        run: |
          git config user.name  "Common Crawl Bot"
          git config user.email "bot@dead-internet-observatory.noreply"
          git add data/bronze/common_crawl/ config/cc_progress.json || true
          git diff --cached --quiet || git commit -m "chore(data): CC harvest $(date -u +%Y-%m-%d)"
          git push || echo "Push skipped"
        continue-on-error: true
