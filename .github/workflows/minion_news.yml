name: "📰 News Crawler Minion"

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pyyaml tqdm feedparser beautifulsoup4 lxml

      - name: Run News Crawler Minion
        run: python3 -m minions.news_crawler_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-bronze-${{ github.run_id }}
          path: data/bronze/news/
          retention-days: 7
          if-no-files-found: warn
