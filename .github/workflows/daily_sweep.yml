name: "🌐 Daily Full Sweep"

# Runs all fast minions sequentially each morning, then scores immediately.
# Common Crawl and Wayback run on their own slower schedules.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-minions.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-minions.txt

      - name: Reddit
        run: python3 -m minions.reddit_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: News
        run: python3 -m minions.news_crawler_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: HackerNews
        run: python3 -m minions.hackernews_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Wikipedia
        run: python3 -m minions.wikipedia_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Bluesky
        run: python3 -m minions.bluesky_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 4chan
        run: python3 -m minions.fourchan_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Steam
        run: python3 -m minions.steam_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: YouTube
        run: python3 -m minions.youtube_bot
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: LinkedIn
        run: python3 -m minions.linkedin_bot
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload bronze artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sweep-bronze-${{ github.run_id }}
          path: data/bronze/
          retention-days: 7
          if-no-files-found: warn
