name: "⚙️ Pipeline + Index Update"

on:
  workflow_run:
    workflows:
      - "🤖 Reddit Minion"
      - "📰 News Crawler Minion"
      - "📖 Wikipedia Minion"
      - "🌐 Common Crawl Minion"
      - "🔶 HackerNews Minion"
      - "🕰️ Wayback Machine Minion"
      - "🦋 Bluesky Minion"
      - "🐸 4chan Minion"
      - "🎮 Steam Minion"
      - "📺 YouTube Minion"
      - "💼 LinkedIn Minion"
      - "🌐 Daily Full Sweep"
      - "🔢 Stack Overflow Minion"
      - "🐘 Mastodon Minion"
      - "📰 Substack Minion"
      - "🐙 GitHub Content Minion"
    types: [completed]
  schedule:
    - cron: "0 6 * * *"       # Daily at 06:00 UTC — catches all overnight minions
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: pipeline
  cancel-in-progress: true

jobs:
  process:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-pipeline.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-pipeline.txt

      - name: Cache distilgpt2 model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-distilgpt2-v1
          restore-keys: hf-distilgpt2-

      # ── Download bronze artifacts from all minion runs today ────────────────
      # Uses gh api directly to find and extract each artifact into the exact
      # bronze subdirectory that bronze_ingestion.py expects.
      - name: Download minion artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A DIR_MAP=(
            [reddit]=reddit [news]=news [wikipedia]=wikipedia
            [hn]=hackernews [wayback]=wayback [commoncrawl]=common_crawl
            [bluesky]=bluesky [fourchan]=fourchan [steam]=steam
            [youtube]=youtube [linkedin]=linkedin [twitter]=twitter
            [stackoverflow]=stackoverflow [mastodon]=mastodon
            [substack]=substack [github]=github
          )
          PATTERN='^(reddit|news|wikipedia|hn|wayback|commoncrawl|bluesky|fourchan|steam|youtube|linkedin|twitter|stackoverflow|mastodon|substack|github|sweep)-bronze-'

          download_artifact() {
            local artifact_id=$1 dest=$2
            for attempt in 1 2 3; do
              rm -f /tmp/artifact.zip
              sleep $((attempt * 2 - 2))   # 0s, 2s, 4s
              if gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > /tmp/artifact.zip 2>/tmp/gh_err; then
                return 0
              fi
              echo "    attempt $attempt failed: $(cat /tmp/gh_err)"
            done
            echo "WARN: giving up on artifact $artifact_id after 3 attempts — skipping"
            rm -f /tmp/artifact.zip
            return 1
          }

          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
            | jq -r '[.artifacts[] | select(.expired == false) | select(.name | test("'"$PATTERN"'"))] | group_by(.name | split("-bronze-")[0]) | map(sort_by(.created_at) | last) | .[] | "\(.id) \(.name)"' \
            | while read artifact_id artifact_name; do
                prefix="${artifact_name%%-bronze-*}"
                if [ "$prefix" = "sweep" ]; then
                  echo "==> $artifact_name → data/bronze/ (sweep, all sources)"
                  mkdir -p "data/bronze"
                  if download_artifact "$artifact_id" "data/bronze/"; then
                    unzip -o -q /tmp/artifact.zip -d "data/bronze/"
                  fi
                  continue
                fi
                target_dir="${DIR_MAP[$prefix]}"
                if [ -z "$target_dir" ]; then
                  echo "Unknown prefix: $prefix, skipping"
                  continue
                fi
                echo "==> $artifact_name → data/bronze/$target_dir/"
                mkdir -p "data/bronze/$target_dir"
                if download_artifact "$artifact_id" "data/bronze/$target_dir/"; then
                  unzip -o -q /tmp/artifact.zip -d "data/bronze/$target_dir/"
                fi
              done
          echo "==> Bronze download complete"
          find data/bronze -name "*.jsonl" | wc -l | xargs -I{} echo "  {} JSONL files ready"

      - name: Run Bronze → Silver pipeline
        run: python3 -m pipeline.bronze_ingestion
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run Silver → Gold + Index update
        run: python3 -m pipeline.silver_processing
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENABLE_PERPLEXITY: "1"

      - name: Check Hugging Face token
        id: hf_token
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Push Parquet datasets to Hugging Face ───────────────────────────────
      - name: Push datasets to Hugging Face
        if: ${{ steps.hf_token.outputs.present == 'true' }}
        run: |
          python3 scripts/push_to_hf.py --repo jupiternull/dead-internet-observatory
        env:
          PYTHONPATH: ${{ github.workspace }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
