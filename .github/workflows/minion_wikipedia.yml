name: "📖 Wikipedia Minion"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pyyaml tqdm

      - name: Run Wikipedia Minion
        run: python3 -m minions.wikipedia_bot
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload bronze data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wikipedia-bronze-${{ github.run_id }}
          path: data/bronze/wikipedia/
          retention-days: 7
          if-no-files-found: warn
